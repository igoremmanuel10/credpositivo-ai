name: Deploy Agent to DigitalOcean

on:
  push:
    branches: [main]
    paths:
      - 'agent/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            cd /opt/credpositivo-agent

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Rebuilding agent container ==="
            docker compose up -d --build agent

            echo "=== Waiting for agent to start ==="
            sleep 15

            echo "=== Health check ==="
            HEALTH=$(curl -sf http://localhost:3001/health || echo "FAILED")
            if echo "$HEALTH" | grep -q '"status":"ok"'; then
              echo "Deploy successful! Agent is healthy."
            else
              echo "ERROR: Health check failed!"
              echo "Response: $HEALTH"
              echo "=== Agent logs (last 30 lines) ==="
              docker compose logs --tail=30 agent
              exit 1
            fi

      - name: Notify on failure
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Deploy failed at $(date). Rolling back..."
            cd /opt/credpositivo-agent
            git checkout HEAD~1
            docker compose up -d --build agent
            sleep 10
            curl -sf http://localhost:3001/health || echo "ROLLBACK ALSO FAILED"
