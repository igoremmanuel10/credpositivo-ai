name: Deploy Agent to DigitalOcean

on:
  push:
    branches: [main]
    paths:
      - 'agent/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Sync agent code to server
        run: |
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='data/' \
            --exclude='uploads/' \
            --exclude='monitor/' \
            --exclude='public/' \
            --exclude='.git' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./agent/ root@${{ secrets.SERVER_HOST }}:/opt/credpositivo-agent/

      - name: Rebuild and health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            cd /opt/credpositivo-agent

            echo "=== Rebuilding agent container ==="
            docker compose up -d --build agent

            echo "=== Waiting for agent to start ==="
            sleep 15

            echo "=== Health check ==="
            HEALTH=$(curl -sf http://localhost:3001/health || echo "FAILED")
            if echo "$HEALTH" | grep -q '"status":"ok"'; then
              echo "Deploy successful! Agent is healthy."
            else
              echo "ERROR: Health check failed!"
              echo "Response: $HEALTH"
              echo "=== Agent logs (last 30 lines) ==="
              docker compose logs --tail=30 agent
              exit 1
            fi
