services:
  # ============================================
  # DATABASE
  # ============================================
  postgres:
    restart: unless-stopped
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-credpositivo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: credpositivo_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
      - ./init-db.sh:/docker-entrypoint-initdb.d/000_init_dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-credpositivo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - credpositivo

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - credpositivo

  # ============================================
  # QUEPASA (WhatsApp API)
  # ============================================
  quepasa:
    restart: unless-stopped
    image: codeleaks/quepasa:latest
    ports:
      - "31000:31000"
    environment:
      WEBAPIPORT: "31000"
      WEBSOCKETSSL: "false"
      DOMAIN: "${SERVER_DOMAIN:-159.223.141.100}:31000"
      MASTERKEY: ${QUEPASA_MASTER_KEY}
      ACCOUNTSETUP: "true"
      USER: ${QUEPASA_ADMIN_EMAIL:-admin@credpositivo.com}
      PASSWORD: ${QUEPASA_ADMIN_PASSWORD}
      SIGNING_SECRET: ${QUEPASA_SIGNING_SECRET}
      DBDRIVER: "postgres"
      DBHOST: "postgres"
      DBPORT: "5432"
      DBDATABASE: "quepasa"
      DBUSER: ${POSTGRES_USER:-credpositivo}
      DBPASSWORD: ${POSTGRES_PASSWORD}
      DBSSLMODE: "disable"
      GROUPS: "true"
      BROADCASTS: "false"
      READRECEIPTS: "false"
      CALLS: "false"
      READUPDATE: "true"
      LOGLEVEL: "DEBUG"
      WHATSMEOW_LOGLEVEL: "WARN"
      REMOVEDIGIT9: "false"
      MIGRATIONS: "/builder/migrations"
      TZ: "America/Sao_Paulo"
    volumes:
      - quepasa_data:/opt/quepasa
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - credpositivo

  # ============================================
  # CHATWOOT
  # ============================================
  chatwoot-web:
    restart: unless-stopped
    image: chatwoot/chatwoot:latest
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
      FRONTEND_URL: "http://${SERVER_DOMAIN:-159.223.141.100}:3000"
      DEFAULT_LOCALE: "pt_BR"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-credpositivo}:${POSTGRES_PASSWORD}@postgres:5432/chatwoot"
      REDIS_URL: "redis://redis:6379"
      RAILS_LOG_TO_STDOUT: "true"
      LOG_LEVEL: "info"
      INSTALLATION_NAME: "CredPositivo"
      ENABLE_ACCOUNT_SIGNUP: "false"
      FORCE_SSL: "false"
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - credpositivo

  chatwoot-worker:
    restart: unless-stopped
    image: chatwoot/chatwoot:latest
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
      FRONTEND_URL: "http://${SERVER_DOMAIN:-159.223.141.100}:3000"
      DEFAULT_LOCALE: "pt_BR"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-credpositivo}:${POSTGRES_PASSWORD}@postgres:5432/chatwoot"
      REDIS_URL: "redis://redis:6379"
      RAILS_LOG_TO_STDOUT: "true"
      LOG_LEVEL: "info"
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - credpositivo

  # ============================================
  # CREDPOSITIVO AGENT (AI)
  # ============================================
  agent:
    restart: unless-stopped
    build: .
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_ORG_ID: ${OPENAI_ORG_ID:-}
      QUEPASA_API_URL: http://quepasa:31000
      QUEPASA_MASTER_KEY: ${QUEPASA_MASTER_KEY}
      QUEPASA_BOT_TOKEN: ${QUEPASA_BOT_TOKEN}
      QUEPASA_BOT_TOKENS: ${QUEPASA_BOT_TOKENS}
      CHATWOOT_API_URL: http://chatwoot-web:3000
      CHATWOOT_API_TOKEN: ${CHATWOOT_API_TOKEN}
      CHATWOOT_ACCOUNT_ID: "1"
      CHATWOOT_INBOX_ID: "1"
      CHATWOOT_INBOX_MAPPING: ${CHATWOOT_INBOX_MAPPING:-5571936180654:1,5521971364221:2}
      DATABASE_URL: postgresql://${POSTGRES_USER:-credpositivo}:${POSTGRES_PASSWORD}@postgres:5432/credpositivo_agent
      REDIS_URL: redis://redis:6379
      SITE_URL: ${SITE_URL:-https://www.credpositivo.com/cadastro}
      WHATSAPP_NUMBER: ${WHATSAPP_NUMBER:-5571936180654}
      EBOOK_URL: ${EBOOK_URL}
      MP_PUBLIC_KEY: ${MP_PUBLIC_KEY:-}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}
      MP_CLIENT_ID: ${MP_CLIENT_ID:-}
      MP_CLIENT_SECRET: ${MP_CLIENT_SECRET:-}
      APIFUL_TOKEN: ${APIFUL_TOKEN:-}
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
      META_AD_ACCOUNT_ID: ${META_AD_ACCOUNT_ID:-}
      JWT_SECRET: ${JWT_SECRET:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      SDR_ENABLED: "true"
      SDR_BOT_TOKEN: ${SDR_BOT_TOKEN}
      SDR_BOT_PHONE: "5521971364221"
      PHONE_TO_PERSONA: "5521971364221:paulo,5571936180654:augusto"
      WAVOIP_ENABLED: ${WAVOIP_ENABLED:-false}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ADM_GROUP_JID: ${ADM_GROUP_JID:-}
      AGENDA_ENABLED: "true"
      WAVOIP_TOKEN: ${WAVOIP_TOKEN:-}
      WAVOIP_MAX_DAILY_CALLS: ${WAVOIP_MAX_DAILY_CALLS:-5}
      KRAYIN_ENABLED: ${KRAYIN_ENABLED:-true}
      KRAYIN_API_URL: http://krayin:80
      KRAYIN_API_TOKEN: ${KRAYIN_API_TOKEN:-}
      KRAYIN_PIPELINE_ID: ${KRAYIN_PIPELINE_ID:-1}
    volumes:
      - ./monitor:/data/monitor:ro
      - ./data/diagnosticos:/data/diagnosticos
      - ./uploads:/data/uploads
      - ./public:/app/public:ro
      - ./media:/app/media:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      quepasa:
        condition: service_started
    networks:
      - credpositivo

  # ============================================
  # KRAYIN CRM
  # ============================================
  krayin:
    image: webkul/krayin:2.0.1
    container_name: credpositivo-krayin
    ports:
      - "8085:80"
    environment:
      APP_URL: "http://${SERVER_DOMAIN:-159.223.141.100}:8085"
      APP_TIMEZONE: "America/Sao_Paulo"
      APP_LOCALE: "pt_BR"
      DB_CONNECTION: mysql
      DB_HOST: krayin-mysql
      DB_PORT: "3306"
      DB_DATABASE: krayin
      DB_USERNAME: krayin
      DB_PASSWORD: ${KRAYIN_DB_PASSWORD:-krayin_secret}
    depends_on:
      krayin-mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - credpositivo

  krayin-mysql:
    image: mysql:8.0
    container_name: credpositivo-krayin-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${KRAYIN_MYSQL_ROOT_PASSWORD:-krayin_root_secret}
      MYSQL_DATABASE: krayin
      MYSQL_USER: krayin
      MYSQL_PASSWORD: ${KRAYIN_DB_PASSWORD:-krayin_secret}
    volumes:
      - krayin_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${KRAYIN_MYSQL_ROOT_PASSWORD:-krayin_root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - credpositivo

networks:
  credpositivo:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  quepasa_data:
  krayin_mysql_data:
